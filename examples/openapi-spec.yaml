openapi: "3.0.3"
info:
  title: Example API
  version: "1.0.0"
  description: Sample API specification for threat model demonstration.

servers:
  - url: https://api.example.com/v1

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    apiKey:
      type: apiKey
      in: header
      name: X-API-Key

  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        role:
          type: string
          enum: [admin, user, viewer]
    Error:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string

security:
  - bearerAuth: []

paths:
  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Success
    post:
      operationId: createUser
      tags: [users]
      summary: Create a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/User"
      responses:
        "201":
          description: Created

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Success
    delete:
      operationId: deleteUser
      tags: [users]
      security:
        - bearerAuth: []
        - apiKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /admin/config:
    get:
      operationId: getConfig
      tags: [admin]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current configuration
    put:
      operationId: updateConfig
      tags: [admin]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Updated
