# CI policy for deterministic PR gating.
minimum_severity: info
minimum_score_to_report: 0

scoring:
  likelihood_factor: 0.6
  impact_factor: 0.4
  weights:
    likelihood:
      internet_exposed: 5.0
      no_auth: 4.0
      weak_auth: 3.0
      privileged_container: 4.0
      wide_network_access: 2.0
    impact:
      handles_pii: 4.0
      writes_to_db: 3.0
      admin_scope: 5.0
      availability_critical: 4.0

build:
  # Fail the PR check when any non-allowlisted threat reaches this score.
  fail_on_score_gte: 70
  allowlist_patterns: []
